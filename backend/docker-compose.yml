services:
  postgres:
    image: postgres:16
    container_name: rentit-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=rentit
      - POSTGRES_USER=rentit
      - POSTGRES_PASSWORD=rentit_dev_pass
    volumes:
      - pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build: .
    container_name: rentit-api
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://rentit:rentit_dev_pass@postgres:5432/rentit
      - JWT_SECRET=rentit_dev_secret_key_2026
      - NODE_ENV=development
    depends_on:
      - postgres
    restart: unless-stopped

volumes:
  pg_data:
